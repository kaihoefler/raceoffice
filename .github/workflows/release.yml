name: Build & Release (deploy folder)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (build runtime)
        uses: actions/setup-node@v4
        with:
          # Keep build-time Node in sync with bundled runtime Node (downloaded below)
          # so native modules (e.g. better-sqlite3) are compiled for the same ABI.
          node-version: "22.21.1"
          cache: "npm"


      - name: Install root deps
        run: npm ci

      

            

      - name: Download WinSW + portable Node.exe + AMMC tools

        shell: powershell
        run: |
          # --- WinSW ---
          New-Item -ItemType Directory -Force tools\winsw | Out-Null
          $winswUrl = "https://github.com/winsw/winsw/releases/download/v2.12.0/WinSW-x64.exe"
          Invoke-WebRequest -Uri $winswUrl -OutFile tools\winsw\RaceOfficeServer.exe

          # --- Portable Node runtime (only node.exe is needed at runtime) ---
          New-Item -ItemType Directory -Force tools\node | Out-Null
          $nodeVer = "22.21.1"
          $zipName = "node-v$nodeVer-win-x64.zip"
          $nodeUrl = "https://nodejs.org/dist/v$nodeVer/$zipName"
          Invoke-WebRequest -Uri $nodeUrl -OutFile $zipName

          if (Test-Path nodezip) { Remove-Item nodezip -Recurse -Force }
          Expand-Archive -Path $zipName -DestinationPath nodezip
          Copy-Item "nodezip\node-v$nodeVer-win-x64\node.exe" -Destination "tools\node\node.exe" -Force

          # --- AMMC tools (from ammc-latest.zip) ---
          New-Item -ItemType Directory -Force tools\ammc | Out-Null
          $ammcZip = "ammc-latest.zip"
          $ammcUrl = "https://www.ammconverter.eu/ammc-latest.zip"
          Invoke-WebRequest -Uri $ammcUrl -OutFile $ammcZip

          if (Test-Path ammczip) { Remove-Item ammczip -Recurse -Force }
          Expand-Archive -Path $ammcZip -DestinationPath ammczip

          $entries = Get-ChildItem -Path ammczip
          if ($entries.Count -eq 1 -and $entries[0].PSIsContainer) {
            $ammcSourcePath = $entries[0].FullName
          } else {
            $ammcSourcePath = "ammczip"
          }

          Copy-Item "$ammcSourcePath\*" -Destination "tools\ammc" -Recurse -Force

          # Validate AMMC payload to fail fast on broken/changed upstream archive.
          $ammcExecutables = Get-ChildItem -Path "tools\ammc" -Recurse -File -Filter "ammc-*.exe"
          if ($ammcExecutables.Count -eq 0) {
            Write-Error "AMMC download validation failed: no ammc-*.exe found under tools\ammc"
            exit 1
          }

          Write-Host "AMMC executables found:" ($ammcExecutables | ForEach-Object { $_.FullName } | Out-String)

      - name: Build deploy folder

        run: npm run deploy

      - name: Create ZIP from deploy folder
        shell: powershell
        run: |
          if (Test-Path raceoffice.zip) { Remove-Item raceoffice.zip -Force }
          Compress-Archive -Path deploy\* -DestinationPath raceoffice.zip

      - name: Create GitHub Release + upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: raceoffice.zip
          generate_release_notes: true
